name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build Linux artifacts (.deb + AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libasound2-dev fuse libfuse2

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release
        run: cargo build --release --locked

      - name: Build .deb
        run: cargo deb --no-build

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            target/debian/*.deb
            dist/*.AppImage

  build-windows:
    name: Build Windows artifact (.zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $ver = (Select-String -Path Cargo.toml -Pattern '^version = "(.*)"').Matches[0].Groups[1].Value
          $stage = "dist/phone-tv-$ver-windows-x86_64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/release/phone-tv.exe $stage/
          Copy-Item README.md $stage/
          Copy-Item LICENSE $stage/
          Compress-Archive -Path $stage/* -DestinationPath "dist/phone-tv-$ver-windows-x86_64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifact
          path: dist/*.zip

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/linux-artifacts/**/*.deb
            artifacts/linux-artifacts/**/*.AppImage
            artifacts/windows-artifact/**/*.zip

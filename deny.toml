# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
    # RUSTSEC-2026-0097 — `rand` soundness issue in a code path (custom logger
    # using rand::rng()) that this project does not exercise. Pulled twice
    # transitively:
    #   rand 0.8.5 <- phf <- mime_guess2 <- egui_extras
    #   rand 0.9.2 <- quinn-proto <- quinn <- reqwest
    # quinn-proto still pins rand 0.9.2. Re-evaluate when quinn ships
    # rand 0.9.3+ and when egui_extras drops phf via mime_guess2.
    "RUSTSEC-2026-0097",
    # RUSTSEC-2026-0194 / RUSTSEC-2026-0195 — quick-xml DoS issues (quadratic
    # attribute checks, unbounded namespace allocations) on attacker-controlled
    # XML. Only pulled at build time by wayland-scanner to parse the Wayland
    # protocol XML bundled in the wayland crates — trusted input, never user
    # data. Fixed in quick-xml >=0.41, but wayland-scanner (0.31.10, latest)
    # pins ^0.39. Re-evaluate when wayland-scanner bumps quick-xml.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # RUSTSEC-2026-0192 — ttf-parser is unmaintained (informational, not a
    # vulnerability). Pulled by egui's text stack (epaint -> ab_glyph ->
    # owned_ttf_parser); no alternative until egui switches font parsers.
    "RUSTSEC-2026-0192",
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "CDLA-Permissive-2.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
